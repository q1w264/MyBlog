name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Build And Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # 如果你的主题是子模块，这行很重要
          fetch-depth: 0

      # 1. 在环境最新的 GitHub Runner 上安装并运行 Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.152.2'
          extended: true          # 大多数现代主题需要 extended 版本

      - name: Build Hugo Site
        run: hugo --gc --minify   # 构建你的博客，生成 public 文件夹

      # 2. 把生成好的文件直接上传给 Azure，跳过 Azure 自己的编译步骤
      - name: Build And Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_ROCK_02FD3D910 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          
          # 关键改动：
          skip_app_build: true     # 告诉 Azure：我已经打包好了，你别动
          app_location: "public"   # 告诉 Azure：直接上传 public 文件夹里的内容
          output_location: ""      # 留空
          api_location: ""         # 留空

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_ROCK_02FD3D910 }}
          action: "close"
