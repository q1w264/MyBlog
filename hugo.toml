baseURL = "https://www.q1w264.com/"
theme = "hugo-primer-blog"
copyright = '© 2026 q1w264'

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true

[params]
email = "shilong.yuan@q1w264.com"
dateFormat = "2006-01-02" 
defaultTheme = "auto" # auto, light, or dark
googleAnalyticsID = "G-QP462JDKRZ" # Google Analytics 4 ID
recentPostsCount = 5 # Number of recent posts in sidebar module
showAuthor = true 
showReadingTime = true 
showShareButtons = true 
sidebar = true # Enable/disable sidebar
avatar = "images/logo.png"

[Author] # Used in authorbox
bio = "知识就是力量"
name = "q1w264"
# Sidebar modules - order determines display order
# Available: recentPosts, tags, categories, archive, links (+ custom partials)
[[params.sidebarModules]]
partial = "aboutMe"
[[params.sidebarModules]]
partial = "social"

[[params.sidebarModules]]
partial = "categories"
[[params.sidebarModules]]
partial = "recentPosts"

[[params.sidebarModules]]
partial = "tags"

[[params.sidebarModules]]
partial = "archive"

[params.social]
github = "q1w264"

# Custom favicon (optional)
faviconIco = "static/favicon.ico"
faviconPng = "static/favicon.png"

# Apple Touch Icons (optional)
[[params.appleTouchIcons]]
href = "static/apple-touch-icon-180x180.png"
sizes = "180x180"
[[params.appleTouchIcons]]
href = "static/apple-touch-icon-152x152.png"
sizes = "152x152"

[languages]
[languages.en]
contentDir = "content/en"
languageName = "English"
title = "q1w264's Blog"
weight = 1


[languages.cn]
contentDir = "content/cn"
languageName = "简体中文"
title = "q1w264的博客"
weight = 2

[menus]
# [[languages.en.menus.main]]
# name = "Home"
# url = "/"
# weight = 1

[[languages.en.menus.main]]
name = "About"
url = "/about/"
weight = 1

# [[languages.cn.menus.main]]
# name = "主页面"
# url = "/"
# weight = 1

[[languages.cn.menus.main]]
name = "关于"
url = "/about/"
weight = 1

[outputs]
  home = ['html', 'rss']
  section = ['html', 'rss']
  taxonomy = ['html']
  term = ['html']



[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)'], ['$', '$']]