baseURL = "https://www.q1w264.com/"
theme = "hugo-primer-blog"
title = "q1w264's Blog"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true

[params]
dateFormat = "2006-01-02" 
defaultTheme = "auto" # auto, light, or dark
googleAnalyticsID = "G-QP462JDKRZ" # Google Analytics 4 ID
recentPostsCount = 5 # Number of recent posts in sidebar module
showAuthor = true 
showReadingTime = true 
showShareButtons = true 
sidebar = true # Enable/disable sidebar

[Author] # Used in authorbox
avatar = "images/icon.png"
bio = "知识就是力量"
name = "q1w264"
# Sidebar modules - order determines display order
# Available: recentPosts, tags, categories, archive, links (+ custom partials)
[[params.sidebarModules]]
partial = "categories"
[[params.sidebarModules]]
partial = "recentPosts"

[[params.sidebarModules]]
partial = "tags"

[[params.sidebarModules]]
partial = "archive"

[params.social]
github = "q1w264"

# Custom favicon (optional)
faviconIco = "static/favicon.ico"
faviconPng = "static/favicon.png"

# Apple Touch Icons (optional)
[[params.appleTouchIcons]]
href = "static/apple-touch-icon-180x180.png"
sizes = "180x180"
[[params.appleTouchIcons]]
href = "static/apple-touch-icon-152x152.png"
sizes = "152x152"

[languages]
[languages.en]
contentDir = "content/en"
languageName = "English"
weight = 1
[languages.en.params]
description = "A blog powered by Hugo and Primer CSS"

[languages.cn]
contentDir = "content/cn"
languageName = "简体中文"
weight = 2

[menus]
[[menus.main]]
name = "Home"
url = "/"
weight = 1

[[menus.main]]
name = "About"
url = "/about/"
weight = 2