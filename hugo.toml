baseURL = "https://www.q1w264.com/"
theme = "hugo-primer-blog"
copyright = '© 2026 q1w264'

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true

[params]
author = "q1w264"
aboutName = "Shilong Yuan"
email = "shilong.yuan@q1w264.com"
dateFormat = "2006-01-02" 
defaultTheme = "auto" # auto, light, or dark
googleAnalyticsID = "G-QP462JDKRZ" # Google Analytics 4 ID
recentPostsCount = 5 # Number of recent posts in sidebar module
showAuthor = true 
showReadingTime = true 
showShareButtons = true 
sidebar = true # Enable/disable sidebar
avatar = "images/logo.png"

[Author] # Used in authorbox
bio = "知识就是力量"
name = "q1w264"
# Sidebar modules - order determines display order
# Available: recentPosts, tags, categories, archive, links (+ custom partials)
[[params.sidebarModules]]
partial = "aboutMe"
[[params.sidebarModules]]
partial = "social"

[[params.sidebarModules]]
partial = "categories"
[[params.sidebarModules]]
partial = "recentPosts"

[[params.sidebarModules]]
partial = "tags"

[[params.sidebarModules]]
partial = "archive"

[params.social]
github = "q1w264"

[params.languageLabels]
en = "English"
cn = "简体中文"

[params.rssLanguageCodes]
en = "en-US"
cn = "zh-CN"

# giscus comment system
# Steps to activate:
#   1. Go to https://github.com/q1w264/MyBlog/discussions → Manage categories → New category
#      Name: "Comments", type: "Announcement"
#   2. Visit https://giscus.app, select repo q1w264/MyBlog and the Comments category,
#      then copy the generated categoryID (DIC_...) and paste it below.
[params.giscus]
  enable           = true
  repoID           = "R_kgDOQ-lMpQ"
  category         = "Comments"
  categoryID       = "DIC_kwDOQ-lMpc4DARnw"
  mapping          = "pathname"
  strict           = "0"
  reactionsEnabled = "1"
  emitMetadata     = "0"
  inputPosition    = "bottom"
  loading          = "lazy"

# Custom favicon (optional)
faviconIco = "static/favicon.ico"
faviconPng = "static/favicon.png"

# Apple Touch Icons (optional)
[[params.appleTouchIcons]]
href = "static/apple-touch-icon-180x180.png"
sizes = "180x180"
[[params.appleTouchIcons]]
href = "static/apple-touch-icon-152x152.png"
sizes = "152x152"

[languages]
[languages.en]
contentDir = "content/en"
label = "English"
title = "q1w264's Blog"
weight = 1
[languages.en.params]
copyrightLinks = '[Privacy Policy](/en/privacy/) · [Disclaimer](/en/disclaimer/)'


[languages.cn]
contentDir = "content/cn"
label = "简体中文"
title = "q1w264的博客"
weight = 2
[languages.cn.params]
copyrightLinks = '[隐私政策](/cn/privacy/) · [免责声明](/cn/disclaimer/)'

[menus]
# [[languages.en.menus.main]]
# name = "Home"
# url = "/"
# weight = 1

[[languages.en.menus.main]]
name = "About"
url = "/about/"
weight = 1

# [[languages.cn.menus.main]]
# name = "主页面"
# url = "/"
# weight = 1

[[languages.cn.menus.main]]
name = "关于"
url = "/about/"
weight = 1

[outputs]
  home = ['html', 'rss']
  section = ['html', 'rss']
  taxonomy = ['html']
  term = ['html']

[markup]
  [markup.highlight]
    codeFences = true        # 允许使用 Markdown 的代码围栏 (```)
    guessSyntax = true       # 如果未指定语言，尝试自动猜测语言
    lineNos = false           # 是否显示行号
    lineNumbersInTable = true # 将代码和行号放在表格中，方便复制且不连带行号
    noClasses = false        # 使用 CSS 类，交给主题的 Primer/GitHub 样式处理明暗模式
    style = "github"        # 与 GitHub 风格保持一致；使用 CSS 类时主要由主题样式接管
    tabWidth = 4             # Tab 键的空格宽度
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)'], ['$', '$']]