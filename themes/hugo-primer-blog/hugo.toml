[module]
  [module.hugoVersion]
    min = "0.112.0"

[params]
  # Layout
  sidebar = true
  recentPostsCount = 5

  # Theme
  defaultTheme = "auto"  # auto, light, dark

  # Content
  dateFormat = "2006-01-02"
  showReadingTime = true
  showAuthor = true
  showShareButtons = true

  # OGP / Social
  # ogImage = "/images/og-default.png"  # Default OG image (1200x630 recommended)
  # twitterSite = "your-username"       # Twitter @username (without @)

  # Pagination
  paginate = 10

[markup]
  [markup.highlight]
    style = "github"
    lineNos = false
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Output formats for LLM-friendly content (llms.txt + per-page Markdown).
# These definitions are merged into the consuming site (mediaTypes/outputFormats
# use the "shallow" merge strategy). To actually emit the files, the site must
# opt in via [outputs] (which uses the "none" merge strategy and is NOT
# inherited from a theme), e.g.:
#
#   [outputs]
#   home = ["HTML", "RSS", "LLMS"]
#   page = ["HTML", "Markdown"]
[mediaTypes]
  [mediaTypes."text/markdown"]
    suffixes = ["md"]
  [mediaTypes."text/plain"]
    suffixes = ["txt"]

[outputFormats]
  [outputFormats.Markdown]
    mediaType = "text/markdown"
    baseName = "index"
    isPlainText = true
  [outputFormats.LLMS]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
